[profile.default]
src = "src"
script = "script"
test = "test"
out = "out"
libs = ["node_modules"]
cache_path = "cache"
broadcast = "broadcast"
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
fs_permissions = [
  { access = "read-write", path = "./deployments" }
]
remappings = [
  "@openzeppelin/contracts/=node_modules/@openzeppelin/contracts/"
]

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = true
sort_imports = true
